services:
  - type: web
    name: trustscoremx-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALG
        value: HS256
      - key: DATABASE_URL
        fromDatabase:
          name: trustscoremx-db
          property: connectionString
      - key: APP_URL
        value: https://api.trustscoremx.com
      - key: FRONTEND_URL
        value: https://trustscoremx.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # Cron: refresca OFAC SDN list cada lunes 06:00 UTC
  - type: cron
    name: trustscoremx-refresh-ofac
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "0 6 * * 1"
    startCommand: python scripts/update_ofac.py

  # Cron: refresca SAT 69-B list 1ro de cada mes 06:00 UTC
  - type: cron
    name: trustscoremx-refresh-sat69b
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "0 6 1 * *"
    startCommand: python scripts/update_sat_69b.py

databases:
  - name: trustscoremx-db
    plan: free
    databaseName: trustscoremx
    user: trustscoremx
